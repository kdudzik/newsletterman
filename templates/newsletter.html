<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ subject }}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ css_version() }}">
</head>
<body>
  <header>
    <a href="/" class="back">← All newsletters</a>
    <h1>{{ subject }}</h1>
    <p class="meta">{{ from | sender_name }} · {{ date | relative_date }}{% if word_count %} · {{ word_count | read_time }}{% endif %}</p>
    <div class="actions">
      <a href="{{ gmail_url }}" target="_blank" class="btn btn-ghost">Open in Gmail ↗</a>
      <button id="summarize-btn" class="btn btn-primary" onclick="doSummarize('{{ id }}')">{% if summary %}Summarized ✓{% else %}Summarize{% endif %}</button>
      <button id="done-btn" class="btn btn-done" onclick="markDone('{{ id }}')">Mark as read ✓</button>
    </div>
  </header>

  <div id="summary-box" class="summary-box{% if not summary %} hidden{% endif %}">{% if summary %}{{ summary | markdown_summary }}{% endif %}</div>

  <main class="body-text">
    <pre>{{ body }}</pre>
  </main>

  <script>
    async function doSummarize(id) {
      const btn = document.getElementById('summarize-btn');
      const box = document.getElementById('summary-box');
      btn.disabled = true;
      btn.textContent = 'Summarizing…';
      box.classList.remove('hidden');
      box.innerHTML = 'Thinking…';
      try {
        const res = await fetch(`/newsletter/${id}/summarize`, { method: 'POST' });
        const data = await res.json();
        box.innerHTML = data.summary_html || data.summary || data.detail;
      } catch (e) {
        box.innerHTML = 'Error: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Summarize';
      }
    }

    async function markDone(id) {
      const btn = document.getElementById('done-btn');
      btn.disabled = true;
      btn.textContent = 'Removing label…';
      try {
        await fetch(`/newsletter/${id}/done`, { method: 'POST' });
        window.location.href = '/';
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Mark as read ✓';
        alert('Error: ' + e.message);
      }
    }
  </script>
</body>
</html>
